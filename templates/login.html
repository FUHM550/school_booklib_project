<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='estilos/style.css') }}">
    <title>Iniciar Sesión - {{ rol.capitalize() }}</title>
</head>
<body>
    <header class="barra_superior">
        <div class="logo"><h2>📖 Librería Pro</h2></div>
    </header>

    <main class="imagen">
        {% if rol == 'empleado' %}
        <div id="empleado" class="card-login">
            <h2>Iniciar sesión como Empleado</h2>
            <form action="/login" method="POST">
                <label for="emp-user">Usuario:</label>
                <input type="text" id="emp-user" name="username" required>
                <label for="emp-pass">Contraseña:</label>
                <input type="password" id="emp-pass" name="password" required>
                <button type="submit">Iniciar Sesión</button>
                <a href="{{ url_for('index') }}" class="atras-link">
                    <button type="button" class="atras">Atrás</button>
                </a>
                <p>Sistema de préstamos y servicio al usuario</p>
            </form>
        </div>
        {% endif %}

        {% if rol == 'administrador' %}
        <div id="administrador" class="card-login">
            <h2>Iniciar sesión como Administrador</h2>
            <form action="/login" method="POST">
                <label for="admin-user">Usuario:</label>
                <input type="text" id="admin-user" name="username" required>
                <label for="admin-pass">Contraseña:</label>
                <input type="password" id="admin-pass" name="password" required>
                <button type="submit">Iniciar Sesión</button>
                <a href="{{ url_for('index') }}" class="atras-link">
                    <button type="button" class="atras">Atrás</button>
                </a>
                <p>Sistema de gestión de la librería</p>
            </form>
        </div>
        {% endif %}
    </main>

    <footer class="barra_inferior">
        <p>© 2026 Librería Pro. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
